<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Forum&family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" src="https://necolas.github.io/normalize.css/8.0.1/normalize.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header"> 
        <div class="container">
             <nav class="nav__menu">
                <div class="nav__menu__logo-box">
                    <img src="img/icon.svg" alt="" class="nav__menu--logo">
                    <span class="nav__menu--text">Louvre</span>
                </div>
                <div class="nav__menu--wrapper">
                    <ul class="nav__menu--list">
                        <li class="nav__menu--item">
                            <a href="#" class="nav__menu--link">Visiting</a>

                        <li class="nav__menu--item">
                            <a href="#" class="nav__menu--link">Explore</a>
                        </li>
                        <li class="nav__menu--item">

                        </li>
                        <li class="nav__menu--item">

                        </li>
                    </ul>
                </div>

        </div>

    <main class="main">
        <section class="welcome">
            <div class="container">
                <div class="welcome__box">
                    <h1 class="welcome__title">
                        Welcome <br> to the Louvre
                    </h1>
                    <p class="welcome__text">

                    <a href="#" class="welcome_btn">Discover the Louvre</a>
